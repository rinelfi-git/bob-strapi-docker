# =============================================================================
# Blue-Green avec failover automatique
#
# strapi-master (port 1337) = serveur principal
# strapi-slave  (port 1337) = serveur backup (prend le relais si master down)
#
# Fonctionnement :
#   - En temps normal : seul master tourne, tout le trafic va sur master
#   - Pendant un deploy : slave demarre, deploy.sh arrete master,
#     nginx bascule automatiquement sur slave via error_page
#   - Apres deploy : slave devient le nouveau principal,
#     deploy.sh met a jour ce fichier (swap des roles)
#
# Les noms de conteneurs sont resolus dynamiquement via le resolver Docker
# ce qui permet a nginx de demarrer meme si slave n'existe pas encore.
# =============================================================================

# WebSocket : conditionner le header Connection selon le type de requete
# - Requete WebSocket (Upgrade present) -> Connection: upgrade
# - Requete HTTP classique              -> Connection: close
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;

    server_name bob.strapi-pro.com;

    # Resolver Docker interne (resolution dynamique des noms de conteneurs)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Logs
    access_log /var/log/nginx/bob-strapi-access.log;
    error_log /var/log/nginx/bob-strapi-error.log;

    # Taille maximale des uploads
    client_max_body_size 100M;

    # Proxy vers strapi-master (instance principale)
    location / {
        set $master strapi-master:1337;
        proxy_pass http://$master;
        proxy_http_version 1.1;

        # Failover : si master est down, basculer vers slave
        proxy_intercept_errors on;
        error_page 502 503 504 = @slave_fallback;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (longs pour les WebSocket)
        proxy_connect_timeout 5s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # Fallback vers strapi-slave (resolu dynamiquement, tolere l'absence)
    location @slave_fallback {
        set $slave strapi-slave:1337;
        proxy_pass http://$slave;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }
}
