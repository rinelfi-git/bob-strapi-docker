# =============================================================================
# Reverse proxy externe (Nginx hote) -> Nginx Docker (127.0.0.1:8080)
#
# Ce fichier est a copier dans /etc/nginx/sites-available/ sur le serveur,
# puis a activer avec un lien symbolique dans /etc/nginx/sites-enabled/.
#
# Apres installation, lancer certbot pour ajouter le TLS automatiquement :
#   sudo certbot --nginx -d bob.strapi-pro.com
# =============================================================================

# WebSocket : conditionner le header Connection selon le type de requete
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;

    server_name bob.strapi-pro.com;

    # Taille maximale des uploads (doit correspondre a client_max_body_size du Nginx Docker)
    client_max_body_size 100M;

    # Proxy vers le conteneur Nginx Docker (bind sur 127.0.0.1:8080)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (longs pour les WebSocket)
        proxy_connect_timeout 10s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }
}
